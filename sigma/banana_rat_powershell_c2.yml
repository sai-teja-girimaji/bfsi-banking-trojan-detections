title: Banana RAT C2 Payload Retrieval via PowerShell (SHADOW-WATER-063)
id: 7a1c4d2e-3f5b-4a6c-8d9e-0f1a2b3c4d5e
status: experimental
description: Detects PowerShell download cradles fetching Banana RAT staging
    payloads (st.txt / payload.php) from SHADOW-WATER-063 C2 infrastructure
    targeting Brazilian financial institutions.
references:
    - CYBERXTRON advisory (2026-05-21) - SHADOW-WATER-063 Deploys Banana RAT
author: SOC Detection Engineering
date: 2026-05-25
tags:
    - attack.execution
    - attack.t1059.001
    - attack.command_and_control
    - attack.t1105
logsource:
    category: process_creation
    product: windows
detection:
    selection_proc:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_ioc:
        CommandLine|contains:
            - '24.199.90.58'
            - '162.141.111.227'
            - 'windowsk-cdn.com'
            - '/payload.php'
            - '/st.txt'
    condition: selection_proc and selection_ioc
falsepositives:
    - Highly unlikely; payload paths and C2 IPs are campaign-specific
level: high
